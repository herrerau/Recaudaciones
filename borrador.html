<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENIAT · Panel Fiscal en Tiempo Real</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js">
    </script>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f5fe;
            color: #1a2636;
            padding: 16px 22px;
            transition: background 0.3s, color 0.3s;
        }

        body.dark {
            background: #0a0e17;
            color: #e2e9f2;
        }

        body.dark .card {
            background: #141d2c;
            border-color: #2b3d56;
        }

        body.dark .header-right {
            background: #141d2c;
            border-color: #2b3d56;
        }

        body.dark .region-item {
            background: #1d2b40;
        }

        body.dark .region-item .value {
            background: #0a0e17;
            color: #e2e9f2;
        }

        body.dark .card-change.up {
            background: #153a2a;
            color: #6fcf97;
        }

        body.dark .card-change.down {
            background: #3a1a1a;
            color: #f28b82;
        }

        body.dark .card-sub,
        body.dark .card-footer,
        body.dark .header-left .sub {
            color: #8b9bb5;
        }

        body.dark .ticker-wrapper {
            background: #101a28;
            border-color: #263449;
        }

        body.dark .ticker-item {
            background: #1a2338;
            border-color: #2b3d56;
        }

        body.dark .badge {
            background: #1d2b40;
            color: #a0b6d0;
        }

        body.dark .card-header .title {
            color: #8b9bb5;
        }

        body.dark .card-price .currency {
            color: #8b9bb5;
        }

        body.dark .card-footer {
            border-top-color: #1d2b40;
        }

        body.dark .layout-toolbar {
            background: #141d2c !important;
            border-color: #2b3d56 !important;
        }

        body.dark .layout-toolbar button {
            color: #e2e9f2 !important;
            border-color: #2b3d56 !important;
        }

        body.dark .layout-toolbar button:hover {
            background: #1d2b40 !important;
        }

        /* ===== DASHBOARD ===== */
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left h1 {
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.4px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0a2540;
        }

        body.dark .header-left h1 {
            color: #e2e9f2;
        }

        .header-left h1 i {
            color: #2563eb;
        }

        .header-left .sub {
            font-size: 13px;
            color: #5a6f8a;
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        body.dark .header-left .sub {
            color: #8b9bb5;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #ffffff;
            padding: 5px 20px 5px 24px;
            border-radius: 40px;
            border: 1px solid #d4e0ee;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        body.dark .header-right {
            background: #141d2c;
            border-color: #2b3d56;
            box-shadow: none;
        }

        .badge {
            background: #e8eff9;
            color: #1a3a6a;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        body.dark .badge {
            background: #1d2b40;
            color: #a0b6d0;
        }

        .badge i {
            color: #2563eb;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        /* ===== TOOLBAR ===== */
        .layout-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0 16px;
            padding: 8px 16px;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #d4e0ee;
        }

        .layout-toolbar button {
            background: transparent;
            border: 1px solid #d4e0ee;
            border-radius: 30px;
            padding: 5px 14px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: #1a2636;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .layout-toolbar button:hover {
            background: #e8eff9;
        }

        body.dark .layout-toolbar button:hover {
            background: #1d2b40;
        }

        /* ===== TICKER ===== */
        .ticker-wrapper {
            background: #ffffff;
            border-radius: 40px;
            padding: 8px 20px;
            margin: 6px 0 16px;
            border: 1px solid #d4e0ee;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        body.dark .ticker-wrapper {
            background: #101a28;
            border-color: #263449;
            box-shadow: none;
        }

        .ticker-bar {
            display: flex;
            align-items: center;
            animation: tickerScroll 30s linear infinite;
            white-space: nowrap;
            gap: 30px;
            font-size: 14px;
            font-weight: 500;
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f4f8ff;
            padding: 4px 18px 4px 14px;
            border-radius: 40px;
            border: 1px solid #e4ecf8;
        }

        body.dark .ticker-item {
            background: #1a2338;
            border-color: #2b3d56;
        }

        .ticker-item i {
            color: #2563eb;
            width: 18px;
        }

        .ticker-item .price {
            font-weight: 700;
            color: #0a2540;
        }

        body.dark .ticker-item .price {
            color: #f0f6ff;
        }

        .ticker-item .change {
            font-weight: 600;
            font-size: 13px;
        }

        .ticker-item .change.up {
            color: #16a34a;
        }

        .ticker-item .change.down {
            color: #dc2626;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .ticker-wrapper:hover .ticker-bar {
            animation-play-state: paused;
        }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        /* ===== CARDS ===== */
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 14px 16px 12px;
            border: 1px solid #d4e0ee;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        body.dark .card {
            background: #141d2c;
            border-color: #2b3d56;
            box-shadow: none;
        }

        .card:hover {
            border-color: #2563eb;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.10);
        }

        body.dark .card:hover {
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .card-header .title {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #5a6f8a;
        }

        body.dark .card-header .title {
            color: #8b9bb5;
        }

        .card-header .title i {
            margin-right: 5px;
            color: #2563eb;
            font-size: 12px;
        }

        .card-header .actions i {
            color: #8a9bb5;
            font-size: 12px;
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            transition: 0.1s;
        }

        .card-header .actions i:hover {
            background: #e8eff9;
            color: #1a2636;
        }

        body.dark .card-header .actions i:hover {
            background: #25334a;
            color: #e2e9f2;
        }

        .card-price {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.2px;
            margin: 4px 0 2px;
            color: #0a2540;
        }

        body.dark .card-price {
            color: #e2e9f2;
        }

        .card-price .currency {
            font-size: 14px;
            font-weight: 400;
            color: #5a6f8a;
            margin-left: 4px;
        }

        body.dark .card-price .currency {
            color: #8b9bb5;
        }

        .card-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 600;
            padding: 2px 14px 2px 10px;
            border-radius: 20px;
            width: fit-content;
        }

        .card-change.up {
            background: #dcfce7;
            color: #16a34a;
        }

        .card-change.down {
            background: #fee2e2;
            color: #dc2626;
        }

        body.dark .card-change.up {
            background: #153a2a;
            color: #6fcf97;
        }

        body.dark .card-change.down {
            background: #3a1a1a;
            color: #f28b82;
        }

        .card-sub {
            font-size: 11px;
            color: #5a6f8a;
            margin: 2px 0 6px;
        }

        body.dark .card-sub {
            color: #8b9bb5;
        }

        .card-footer {
            margin-top: 6px;
            border-top: 1px solid #e8eff9;
            padding-top: 6px;
            font-size: 10px;
            color: #5a6f8a;
            display: flex;
            justify-content: space-between;
        }

        body.dark .card-footer {
            border-top-color: #1d2b40;
            color: #8b9bb5;
        }

        /* ===== TRADING ACTIONS ===== */
        .card-trading .card-price {
            font-size: 28px;
            font-weight: 700;
        }

        .card-trading .card-change {
            font-size: 14px;
            padding: 3px 16px 3px 12px;
        }

        .trading-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .trading-actions button {
            flex: 1;
            padding: 6px 12px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .trading-actions .btn-sell {
            background: #fee2e2;
            color: #dc2626;
        }

        .trading-actions .btn-sell:hover {
            background: #fecaca;
        }

        .trading-actions .btn-buy {
            background: #dcfce7;
            color: #16a34a;
        }

        .trading-actions .btn-buy:hover {
            background: #bbf7d0;
        }

        body.dark .trading-actions .btn-sell {
            background: #3a1a1a;
            color: #f28b82;
        }

        body.dark .trading-actions .btn-sell:hover {
            background: #4a2a2a;
        }

        body.dark .trading-actions .btn-buy {
            background: #153a2a;
            color: #6fcf97;
        }

        body.dark .trading-actions .btn-buy:hover {
            background: #1a4a3a;
        }

        /* ===== REGION GRID ===== */
        .region-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 8px;
            margin-top: 6px;
        }

        .region-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px 4px 12px;
            background: #f4f8ff;
            border-radius: 24px;
            font-size: 11px;
            font-weight: 500;
        }

        body.dark .region-item {
            background: #1d2b40;
        }

        .region-item .value {
            background: #ffffff;
            padding: 0 12px;
            border-radius: 20px;
            font-weight: 600;
            color: #0a2540;
            font-size: 11px;
        }

        body.dark .region-item .value {
            background: #0a0e17;
            color: #e2e9f2;
        }

        .region-item .mini-chart {
            width: 44px;
            height: 20px;
            margin-left: 4px;
        }

        .region-item .rank-badge {
            font-size: 10px;
            font-weight: 700;
            color: #2563eb;
            background: #dbeafe;
            padding: 0 8px;
            border-radius: 12px;
            margin-right: 4px;
        }

        body.dark .region-item .rank-badge {
            background: #1a3a6a;
            color: #93c5fd;
        }

        /* ===== CHART CONTAINER ===== */
        .chart-container {
            height: 68px;
            width: 100%;
            margin: 2px 0 4px;
        }

        /* ===== UTILITY ===== */
        .col-span-2 {
            grid-column: span 2;
        }

        .col-span-3 {
            grid-column: span 3;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .col-span-2,
            .col-span-3 {
                grid-column: span 2;
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 10px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .col-span-2,
            .col-span-3 {
                grid-column: span 1;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .region-grid {
                grid-template-columns: 1fr;
            }

            .ticker-bar {
                font-size: 12px;
                gap: 18px;
            }

            .layout-toolbar {
                gap: 6px;
                padding: 6px 12px;
            }

            .layout-toolbar button {
                font-size: 11px;
                padding: 4px 10px;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <div class="header-left">
                <h1><i class="fas fa-landmark"></i> SENIAT · Control Fiscal</h1>
                <div class="sub">
                    <span><i class="far fa-calendar-alt"></i> <span id="currentDate"></span></span>
                    <span><i class="fas fa-sync-alt fa-fw"></i> actualización 2.5s</span>
                    <span><i class="fas fa-chart-line"></i> tiempo real</span>
                    <span><i class="fas fa-circle" style="color:#22c55e; font-size:10px;"></i> en vivo</span>
                </div>
            </div>
            <div class="header-right">
                <span class="badge"><span class="status-dot"></span><i class="fas fa-database"></i> datos en vivo</span>
                <span class="badge"><i class="fas fa-clock"></i> <span id="liveTime">14:32:00</span></span>
                <button id="themeToggleBtn"
                    style="background:transparent; border:1px solid #d4e0ee; border-radius:30px; padding:4px 12px; cursor:pointer; color:#1a2636; display:flex; align-items:center; gap:4px;">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- ===== TOOLBAR ===== -->
        <div class="layout-toolbar">
            <button id="addCardBtn"><i class="fas fa-plus-circle"></i> Añadir</button>
            <button id="removeLastBtn"><i class="fas fa-minus-circle"></i> Quitar</button>
            <button id="resetLayoutBtn"><i class="fas fa-undo-alt"></i> Reiniciar</button>
            <button id="expandActiveBtn"><i class="fas fa-arrows-alt-h"></i> Expandir</button>
            <button id="shrinkActiveBtn"><i class="fas fa-compress-alt"></i> Reducir</button>
            <button id="refreshDataBtn"><i class="fas fa-sync-alt"></i> Actualizar</button>
        </div>

        <!-- ===== TICKER ===== -->
        <div class="ticker-wrapper">
            <div class="ticker-bar" id="tickerBar"></div>
        </div>

        <!-- ===== GRID ===== -->
        <div id="gridContainer" class="grid"></div>

    </div>

    <script>
        (function () {

            // ============================================================
            //  CONFIGURACIÓN
            // ============================================================
            const REGIONS = ['Capital', 'Zuliana', 'Central', 'Nor-Oriental', 'Los Llanos', 'Guayana', 'Insular', 'Los Andes',
                'Falcón', 'Occidental'
            ];

            const TICKER_TOPICS = [
                'Recaudación Total', 'IVA', 'ISLR', 'Aranceles', 'Retenciones',
                'Renta Petrolera', 'Multas', 'Intereses Moratorios', 'Deuda Tributaria',
                'Gasolina', 'Licores', 'Tabaco', 'Alícuotas', 'Fiscalización'
            ];

            const DEFAULT_PANELS = [
                { id: 'recaudacion', title: 'Recaudación Total', icon: 'fa-coins', region: true, wide: true },
                { id: 'maquinas', title: 'Máquinas Fiscales', icon: 'fa-cash-register', region: false, wide: false },
                { id: 'compromisos', title: 'Compromisos de Pago', icon: 'fa-handshake', region: false, wide: false },
                { id: 'monitoreo', title: 'Monitoreo de Pagos', icon: 'fa-credit-card', region: false, wide: false },
                { id: 'denuncias', title: 'Denuncias', icon: 'fa-exclamation-triangle', region: false, wide: false },
                { id: 'topregiones', title: 'Top Recaudación por Región', icon: 'fa-trophy', region: true, wide: true },
            ];

            // ============================================================
            //  ESTADO
            // ============================================================
            let panels = [];
            let isDark = false;
            let intervalId = null;
            let chartInstances = {};

            // ============================================================
            //  HELPERS
            // ============================================================
            function randomValue(base, variation = 0.15) {
                return Math.round((base + (Math.random() - 0.5) * base * variation) * 100) / 100;
            }

            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function generateChange() {
                return Math.round(((Math.random() * 12) - 3) * 10) / 10;
            }

            function generateTrendData(base = 100, volatility = 0.045, length = 30) {
                const series = [];
                let price = base;
                for (let i = 0; i < length; i++) {
                    price = price * (1 + 0.006 + (Math.random() - 0.5) * volatility);
                    price = Math.max(price, base * 0.55);
                    series.push(Math.round(price * 100) / 100);
                }
                return series;
            }

            function generateRegionData() {
                const data = {};
                REGIONS.forEach(r => {
                    data[r] = {
                        rec: randomInt(800, 9500),
                        maq: randomInt(20, 180),
                        comp: randomInt(150, 3200),
                        pagos: randomInt(100, 2800),
                        den: randomInt(2, 65)
                    };
                });
                return data;
            }

            function drawMiniChart(canvas, data, color = '#2563eb') {
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const w = 44,
                    h = 20;
                canvas.width = w;
                canvas.height = h;
                const max = Math.max(...data),
                    min = Math.min(...data);
                const range = max - min || 1;
                ctx.clearRect(0, 0, w, h);

                // Línea
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                data.forEach((v, i) => {
                    const x = (i / (data.length - 1)) * w;
                    const y = h - ((v - min) / range) * h * 0.75 - 2;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                });
                ctx.stroke();

                // Relleno degradado
                ctx.lineTo(w, h);
                ctx.lineTo(0, h);
                ctx.closePath();
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, color + '40');
                grad.addColorStop(1, color + '08');
                ctx.fillStyle = grad;
                ctx.fill();
            }

            // ============================================================
            //  RENDER
            // ============================================================
            function renderPanels() {
                const grid = document.getElementById('gridContainer');
                grid.innerHTML = '';
                chartInstances = {};
                const regionData = generateRegionData();

                const sortedRegions = Object.entries(regionData)
                    .sort((a, b) => b[1].rec - a[1].rec)
                    .slice(0, 6);

                panels.forEach((panel, index) => {
                    const card = document.createElement('div');
                    const wideClass = panel.wide ? ' col-span-2' : '';
                    card.className = `card${wideClass}`;
                    card.dataset.index = index;
                    card.dataset.id = panel.id;

                    const change = generateChange();
                    const changeClass = change >= 0 ? 'up' : 'down';
                    const changeSymbol = change >= 0 ? '▲' : '▼';
                    const mainValue = randomInt(8000, 65000);

                    let contentHTML = `
                            <div class="card-header">
                                <span class="title"><i class="fas ${panel.icon}"></i> ${panel.title}</span>
                                <div class="actions">
                                    <i class="fas fa-expand" data-action="expand"></i>
                                    <i class="fas fa-compress" data-action="shrink"></i>
                                    <i class="fas fa-times" data-action="remove"></i>
                                </div>
                            </div>
                            <div class="card-price">${mainValue.toLocaleString()} <span class="currency">Bs</span></div>
                            <div class="card-change ${changeClass}"><span>${changeSymbol} ${Math.abs(change)}%</span></div>
                            <div class="card-sub">${panel.region ? 'distribución por región' : 'variación vs período anterior'}</div>
                        `;

                    // --- Paneles con lista de regiones ---
                    if (panel.id === 'recaudacion') {
                        let listHTML = `<div class="region-grid">`;
                        Object.entries(regionData).slice(0, 8).forEach(([name, vals]) => {
                            const series = generateTrendData(vals.rec, 0.05, 12);
                            const changeLocal = generateChange();
                            const sym = changeLocal >= 0 ? '▲' : '▼';
                            listHTML += `
                                    <div class="region-item">
                                        <span>${name}</span>
                                        <span class="value">${vals.rec.toLocaleString()}</span>
                                        <span style="font-size:9px; font-weight:600; color:${changeLocal >= 0 ? '#16a34a' : '#dc2626'}; margin-left:2px;">${sym}${Math.abs(changeLocal).toFixed(1)}%</span>
                                        <canvas class="mini-chart" data-series="${series.join(',')}"></canvas>
                                    </div>
                                `;
                        });
                        listHTML +=
                            `</div><div class="card-footer"><span>${REGIONS.length} regiones</span><span>total ${Object.values(regionData).reduce((acc, v) => acc + v.rec, 0).toLocaleString()}</span></div>`;
                        contentHTML += listHTML;
                    } else if (panel.id === 'topregiones') {
                        let listHTML = `<div class="region-grid">`;
                        sortedRegions.forEach(([name, vals], idx) => {
                            const series = generateTrendData(vals.rec, 0.04, 12);
                            const changeLocal = generateChange();
                            const sym = changeLocal >= 0 ? '▲' : '▼';
                            listHTML += `
                                    <div class="region-item">
                                        <span><span class="rank-badge">#${idx + 1}</span> ${name}</span>
                                        <span class="value">${vals.rec.toLocaleString()}</span>
                                        <span style="font-size:9px; font-weight:600; color:${changeLocal >= 0 ? '#16a34a' : '#dc2626'}; margin-left:2px;">${sym}${Math.abs(changeLocal).toFixed(1)}%</span>
                                        <canvas class="mini-chart" data-series="${series.join(',')}"></canvas>
                                    </div>
                                `;
                        });
                        listHTML +=
                            `</div><div class="card-footer"><span>Top ${sortedRegions.length} regiones</span><span>promedio ${Math.round(Object.values(regionData).reduce((acc, v) => acc + v.rec, 0) / REGIONS.length).toLocaleString()}</span></div>`;
                        contentHTML += listHTML;
                    } else {
                        // --- Paneles con gráfico ---
                        const chartData = generateTrendData(mainValue * 0.4, 0.055, 30);
                        contentHTML += `<div class="chart-container" id="chart-${panel.id}-${index}"></div>`;

                        let footerText = '';
                        let footerValue = '';
                        let tradingActions = '';
                        switch (panel.id) {
                            case 'maquinas':
                                footerText = 'máquinas activas';
                                footerValue = randomInt(50, 450).toLocaleString();
                                tradingActions = `
                                        <div class="trading-actions">
                                            <button class="btn-sell"><i class="fas fa-arrow-down"></i> SELL</button>
                                            <button class="btn-buy"><i class="fas fa-arrow-up"></i> BUY</button>
                                        </div>
                                    `;
                                break;
                            case 'compromisos':
                                footerText = 'compromisos pendientes';
                                footerValue = randomInt(120, 3800).toLocaleString();
                                break;
                            case 'monitoreo':
                                footerText = 'pagos procesados';
                                footerValue = randomInt(800, 5200).toLocaleString();
                                break;
                            case 'denuncias':
                                footerText = 'denuncias atendidas';
                                footerValue = randomInt(12, 180).toLocaleString();
                                break;
                            default:
                                footerText = 'tendencia';
                                footerValue = `${randomInt(40, 92)}%`;
                        }
                        contentHTML +=
                            `<div class="card-footer"><span>${footerText}</span><span>${footerValue}</span></div>`;
                        if (tradingActions) {
                            contentHTML += tradingActions;
                            card.classList.add('card-trading');
                        }
                    }

                    card.innerHTML = contentHTML;
                    grid.appendChild(card);

                    // --- Dibujar mini charts ---
                    card.querySelectorAll('.mini-chart').forEach(canvas => {
                        const seriesStr = canvas.dataset.series;
                        if (seriesStr) {
                            const data = seriesStr.split(',').map(Number);
                            drawMiniChart(canvas, data, isDark ? '#3b82f6' : '#2563eb');
                        }
                    });

                    // --- Crear gráficos con Lightweight Charts ---
                    const container = card.querySelector('.chart-container');
                    if (container && panel.id !== 'recaudacion' && panel.id !== 'topregiones') {
                        try {
                            const chart = LightweightCharts.createChart(container, {
                                width: container.clientWidth || 200,
                                height: 68,
                                layout: {
                                    background: { color: 'transparent' },
                                    textColor: isDark ? '#8b9bb5' : '#5a6f8a'
                                },
                                grid: { vertLines: { visible: false }, horzLines: { visible: false } },
                                rightPriceScale: { visible: false },
                                timeScale: { visible: false },
                                handleScroll: false,
                                handleScale: false,
                            });
                            const lineSeries = chart.addLineSeries({
                                color: '#2563eb',
                                lineWidth: 2,
                                priceLineVisible: false,
                                lastPriceAnimation: 1
                            });
                            const priceData = generateTrendData(mainValue * 0.35, 0.05, 30);
                            const data = priceData.map((p, i) => ({ time: i, value: p }));
                            lineSeries.setData(data);
                            chart.timeScale().fitContent();
                            chartInstances[`${panel.id}-${index}`] = chart;

                            // Redimensionar
                            const resizeChart = () => {
                                if (container.clientWidth > 0) {
                                    chart.applyOptions({ width: container.clientWidth });
                                }
                            };
                            setTimeout(resizeChart, 100);
                            // Usar ResizeObserver para mayor precisión
                            if (window.ResizeObserver) {
                                const ro = new ResizeObserver(() => resizeChart());
                                ro.observe(container);
                            }
                        } catch (e) {
                            // Fallback: mostrar mensaje simple
                            container.innerHTML =
                                `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b9bb5;font-size:11px;">📈 datos en tiempo real</div>`;
                        }
                    }

                    // --- Eventos de acciones ---
                    card.querySelectorAll('.actions i').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const action = btn.dataset.action;
                            const idx = parseInt(card.dataset.index);
                            if (action === 'remove') {
                                if (panels.length <= 1) return;
                                panels.splice(idx, 1);
                                renderPanels();
                            } else if (action === 'expand') {
                                panels[idx].wide = true;
                                renderPanels();
                            } else if (action === 'shrink') {
                                panels[idx].wide = false;
                                renderPanels();
                            }
                        });
                    });
                });

                renderTicker();
                updateClock();
            }

            // ============================================================
            //  TICKER
            // ============================================================
            function renderTicker() {
                const bar = document.getElementById('tickerBar');
                if (!bar) return;
                const items = [];
                for (let i = 0; i < 24; i++) {
                    const topic = TICKER_TOPICS[Math.floor(Math.random() * TICKER_TOPICS.length)];
                    const price = (Math.random() * 800 + 5).toFixed(2);
                    const change = (Math.random() * 14 - 2).toFixed(2);
                    const cls = parseFloat(change) >= 0 ? 'up' : 'down';
                    const arrow = parseFloat(change) >= 0 ? '▲' : '▼';
                    items.push(`
                            <span class="ticker-item">
                                <i class="fas fa-chart-simple"></i> ${topic}
                                <span class="price">${price} Bs</span>
                                <span class="change ${cls}">${arrow} ${Math.abs(change)}%</span>
                            </span>
                        `);
                }
                bar.innerHTML = items.join('') + items.join('');
            }

            // ============================================================
            //  RELOJ
            // ============================================================
            function updateClock() {
                const now = new Date();
                const timeStr = now.toTimeString().split(' ')[0];
                const dateEl = document.getElementById('liveTime');
                const dateEl2 = document.getElementById('currentDate');
                if (dateEl) dateEl.textContent = timeStr;
                if (dateEl2) {
                    const dateStr = now.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
                    dateEl2.textContent = dateStr.replace('.', '');
                }
            }

            // ============================================================
            //  THEME TOGGLE
            // ============================================================
            function toggleTheme() {
                isDark = !isDark;
                document.body.classList.toggle('dark', isDark);
                const btn = document.getElementById('themeToggleBtn');
                btn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
                renderPanels();
            }

            // ============================================================
            //  REFRESH
            // ============================================================
            function refreshData() {
                renderPanels();
            }

            // ============================================================
            //  INIT
            // ============================================================
            document.addEventListener('DOMContentLoaded', function () {
                panels = DEFAULT_PANELS.map(p => ({ ...p }));
                renderPanels();

                // Actualización automática cada 2.5s
                intervalId = setInterval(refreshData, 2500);

                // Reloj cada segundo
                setInterval(updateClock, 1000);

                // Toggle tema
                document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

                // Toolbar buttons
                document.getElementById('addCardBtn').addEventListener('click', () => {
                    const titles = ['Recaudación Total', 'Máquinas Fiscales', 'Compromisos de Pago', 'Monitoreo de Pagos',
                        'Denuncias', 'Top Recaudación por Región'
                    ];
                    const icons = ['fa-coins', 'fa-cash-register', 'fa-handshake', 'fa-credit-card',
                        'fa-exclamation-triangle', 'fa-trophy'
                    ];
                    const idx = randomInt(0, titles.length - 1);
                    panels.push({
                        id: `panel-${Date.now()}`,
                        title: titles[idx],
                        icon: icons[idx],
                        region: idx === 0 || idx === 5,
                        wide: idx === 0 || idx === 5
                    });
                    renderPanels();
                });

                document.getElementById('removeLastBtn').addEventListener('click', () => {
                    if (panels.length <= 1) return;
                    panels.pop();
                    renderPanels();
                });

                document.getElementById('resetLayoutBtn').addEventListener('click', () => {
                    panels = DEFAULT_PANELS.map(p => ({ ...p }));
                    renderPanels();
                });

                document.getElementById('expandActiveBtn').addEventListener('click', () => {
                    if (panels.length > 0) panels[0].wide = true;
                    renderPanels();
                });

                document.getElementById('shrinkActiveBtn').addEventListener('click', () => {
                    if (panels.length > 0) panels[0].wide = false;
                    renderPanels();
                });

                document.getElementById('refreshDataBtn').addEventListener('click', refreshData);
            });

            // Exponer para debugging
            window.seniatDashboard = { refreshData };

        })();
    </script>

</body>

</html>
