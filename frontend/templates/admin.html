<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENIAT - Administrador de Paneles</title>
  <link rel="stylesheet" href="/static/css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1><i class="fa-solid fa-sliders"></i> Control de Personalización de Pantallas</h1>
        <p>Gestiona pantallas, regiones y componentes visibles desde un solo lugar.</p>
      </div>
      <div class="badge"><i class="fa-solid fa-server"></i> API local activa</div>
    </header>

    <div class="form-grid">
      <section class="form-card">
        <form id="panelForm">
          <div class="form-group">
            <label for="userId">ID Único de la Pantalla / Usuario:</label>
            <input type="text" id="userId" placeholder="ej: fiscalia_andes, pantalla_central" required />
          </div>
          <div class="form-group">
            <label for="nombreUsuario">Nombre Descriptivo de la Pantalla:</label>
            <input type="text" id="nombreUsuario" placeholder="ej: Monitor Sala Situacional Los Andes" required />
          </div>
          <div class="form-group">
            <label>Componentes Visibles:</label>
            <div class="checkbox-group">
              <label><input type="checkbox" id="moraRecaudacion" checked /> Recaudación ($)</label>
              <label><input type="checkbox" id="moraMaquinas" checked /> Máquinas Fiscales</label>
              <label><input type="checkbox" id="moraDeclaraciones" checked /> Declaraciones</label>
            </div>
          </div>
          <div class="form-group">
            <label>Regiones Geográficas Asignadas:</label>
            <div class="region-selector">
              <label><input type="checkbox" class="reg-check" value="REGION CAPITAL" /> Capital</label>
              <label><input type="checkbox" class="reg-check" value="REGION CENTRAL" /> Central</label>
              <label><input type="checkbox" class="reg-check" value="REGION LOS ANDES" /> Los Andes</label>
              <label><input type="checkbox" class="reg-check" value="REGION ZULIANA" /> Zuliana</label>
              <label><input type="checkbox" class="reg-check" value="REGION GUAYANA" /> Guayana</label>
              <label><input type="checkbox" class="reg-check" value="REGIÓN FALCÓN" /> Falcón</label>
              <label><input type="checkbox" class="reg-check" value="REGION INSULAR" /> Insular</label>
              <label><input type="checkbox" class="reg-check" value="REGION LOS LLANOS" /> Los Llanos</label>
              <label><input type="checkbox" class="reg-check" value="REGION NOR ORIENTAL" /> Nor Oriental</label>
              <label><input type="checkbox" class="reg-check" value="REGION CENTRO OCCIDENTAL" /> Centro Occidental</label>
              <label><input type="checkbox" class="reg-check" value="REGION LIBERTADOR" /> Libertador</label>
              <label><input type="checkbox" class="reg-check" value="REGION DE CONTRIBUYENTES ESPECIALES" /> Especiales</label>
            </div>
          </div>
          <button type="submit"><i class="fa-solid fa-floppy-disk"></i> Generar y Guardar Pantalla</button>
        </form>
      </section>

      <section class="form-card">
        <h2>Pantallas Activas y Enlaces de Transmisión</h2>
        <table id="usuariosTable">
          <thead>
            <tr>
              <th>Nombre de Pantalla</th>
              <th>ID Usuario</th>
              <th>Regiones</th>
              <th>Componentes</th>
              <th>Enlace</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="5" class="empty-state">Cargando configuraciones...</td></tr>
          </tbody>
        </table>
      </section>
    </div>
  </div>

  <script src="/static/js/admin.js"></script>
</body>
</html>
