<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENIAT · Panel Fiscal en Tiempo Real</title>
  <link rel="stylesheet" href="/static/css/dashboard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="dashboard">
    <header>
      <div>
        <h1><i class="fas fa-landmark"></i> <span id="pageTitle">SENIAT · Control Fiscal</span></h1>
        <div class="sub" id="summaryText">Cargando datos del sistema...</div>
      </div>
      <div class="badge"><span class="status"></span> Metabase API <span id="apiStatus">Conectando...</span></div>
    </header>

    <section class="hero">
      <p>Vista personalizada para la pantalla seleccionada, con datos en tiempo real y accesos por región.</p>
    </section>

    <section id="cards" class="grid"></section>

    <section class="table-card">
      <h3>Principales regiones</h3>
      <table>
        <thead>
          <tr>
            <th>Región</th>
            <th>Recaudación</th>
            <th>Tendencia</th>
          </tr>
        </thead>
        <tbody id="regionRows"></tbody>
      </table>
    </section>
  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
